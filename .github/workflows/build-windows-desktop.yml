name: Build Windows Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "windows-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run dist

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ruhsat360-Windows
          path: desktop/release/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.exe
          name: Ruhsat360 Windows ${{ github.ref_name }}
          body: |
            Ruhsat360 Windows masaüstü uygulaması.

            Bu sürüm Google Drive OAuth bağlantısı için panel.ruhsat360.com kaynağını kullanır.
