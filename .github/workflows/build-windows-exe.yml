name: Mimari3D Windows EXE

# DWG->3B/PDF masaüstü uygulamasını Windows .exe olarak derler.
# Sekmedeki "Actions" bölümünden elle çalıştırılabilir; ayrıca desktop/mimari3d
# altındaki değişikliklerde otomatik derler. Üretilen exe "Artifacts" altından
# indirilir. Bir sürüm etiketi (v*) atılırsa Release'e de eklenir.

on:
  workflow_dispatch:
  push:
    paths:
      - "desktop/mimari3d/**"
      - ".github/workflows/build-windows-exe.yml"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop/mimari3d
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: EXE derle
        run: pyinstaller --noconfirm mimari3d.spec

      - name: Duman testi (örnek DXF ile CLI)
        run: |
          python make_sample.py
          python cli.py samples/ornek_plan.dxf -o out_ci

      - name: EXE'yi yükle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Mimari3D-Windows
          path: desktop/mimari3d/dist/Mimari3D.exe
          if-no-files-found: error

      - name: Sürüm etiketinde Release'e ekle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/mimari3d/dist/Mimari3D.exe
