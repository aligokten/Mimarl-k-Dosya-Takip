<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Bağlantı Yok</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #212124; color: #e4e4e7;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .card {
      max-width: 420px; padding: 40px; text-align: center;
      background: rgba(255, 255, 255, 0.04); border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .icon {
      width: 56px; height: 56px; margin: 0 auto 16px; border-radius: 16px;
      background: linear-gradient(135deg, #fb923c, #ea580c);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; color: #a1a1aa; line-height: 1.6; margin: 0 0 24px; }
    button {
      background: #fff; color: #18181b; border: 0; border-radius: 999px;
      padding: 10px 28px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #e4e4e7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>İnternet bağlantısı yok</h1>
    <p>
      Dosya Takip Sistemi, verileri buluttan (Firebase) okuduğu için internet
      bağlantısı gerektirir. Bağlantınızı kontrol edip tekrar deneyin.
    </p>
    <button onclick="location.href='https://aligokten.github.io/Mimarl-k-Dosya-Takip/'">
      Tekrar Dene
    </button>
  </div>
</body>
</html>
